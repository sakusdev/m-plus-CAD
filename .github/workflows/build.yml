name: Build

on:
  push:
    branches: [main, integration/mcad, integration/live-link]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle
      - name: Build and test
        shell: bash
        run: |
          chmod +x gradlew
          if ! ./gradlew --no-daemon --console=plain clean build >gradle-build.log 2>&1; then
            tail -n 100 gradle-build.log
            exit 1
          fi
          tail -n 40 gradle-build.log
      - name: Validate and test Blender add-on
        shell: bash
        run: |
          python3 -m compileall -q blender-addon/mcad_live_link blender-addon/tests
          python3 -m unittest discover -s blender-addon/tests -v
          find blender-addon -type d -name __pycache__ -prune -exec rm -rf {} +
          find blender-addon -type f -name '*.pyc' -delete
          (cd blender-addon && zip -q -r ../m-plus-cad-blender-addon.zip mcad_live_link)
      - name: Upload runnable Fabric mod
        uses: actions/upload-artifact@v4
        with:
          name: m-plus-cad-fabric
          path: |
            mcad-minecraft/build/libs/*.jar
            !mcad-minecraft/build/libs/*-sources.jar
            !mcad-minecraft/build/libs/*-javadoc.jar
            !mcad-minecraft/build/libs/*-dev.jar
          if-no-files-found: error
          retention-days: 14
      - name: Upload Blender add-on
        uses: actions/upload-artifact@v4
        with:
          name: m-plus-cad-blender-addon
          path: m-plus-cad-blender-addon.zip
          if-no-files-found: error
          retention-days: 14
      - name: Upload Gradle log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-log
          path: gradle-build.log
          if-no-files-found: error
          retention-days: 3
