name: Build

on:
  push:
    branches: [main, integration/mcad]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle
      - name: Build and test
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon clean check
