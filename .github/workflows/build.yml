name: Build

on:
  push:
    branches: [main, integration/mcad]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle
      - name: Build and test
        shell: bash
        run: |
          chmod +x gradlew
          if ! ./gradlew --no-daemon --console=plain clean check >gradle-build.log 2>&1; then
            tail -n 100 gradle-build.log
            exit 1
          fi
          tail -n 40 gradle-build.log
