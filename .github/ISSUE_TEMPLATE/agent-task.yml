name: Agent implementation task
description: Define one conflict-safe implementation responsibility
title: "[Agent] "
body:
  - type: textarea
    id: responsibility
    attributes:
      label: Responsibility
      description: One narrowly defined responsibility owned by this task.
    validations:
      required: true
  - type: textarea
    id: allowed
    attributes:
      label: Allowed paths
      description: Exact paths or globs this task may change.
      placeholder: |
        - mcad-export-obj/**
        - fixtures/obj/**
    validations:
      required: true
  - type: textarea
    id: forbidden
    attributes:
      label: Forbidden paths
      description: Shared or unrelated paths that must not be changed.
      placeholder: |
        - docs/contracts/**
        - settings.gradle.kts
        - mcad-api/**
    validations:
      required: true
  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies
      description: Issues, PRs, modules, or contracts this task depends on.
  - type: textarea
    id: contracts
    attributes:
      label: Stable contracts used
      description: Link the exact files under docs/contracts.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Observable completion criteria.
    validations:
      required: true
  - type: textarea
    id: tests
    attributes:
      label: Required tests
      description: Unit, fixture, integration, or manual checks required.
    validations:
      required: true
  - type: textarea
    id: out_of_scope
    attributes:
      label: Out of scope
      description: Work explicitly excluded from this task.
    validations:
      required: true
  - type: input
    id: base_branch
    attributes:
      label: Base branch
      placeholder: integration/mcad
    validations:
      required: true
  - type: checkboxes
    id: rules
    attributes:
      label: Contribution rules
      options:
        - label: I will read ARCHITECTURE.md and CONTRIBUTING_AGENTS.md before editing.
          required: true
        - label: I will open a Draft PR and will not merge it.
          required: true
        - label: I will propose shared contract changes instead of changing them inside this task.
          required: true
        - label: I will not add or extract Minecraft assets.
          required: true
